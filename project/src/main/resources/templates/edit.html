<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<title>Edit Task</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">
<div class="card p-4 shadow">

<h3>Edit Task</h3>

<form method="post" action="/update">

<input type="hidden" name="id" th:value="${task.id}"/>

<input name="title" th:value="${task.title}" class="form-control mb-2">
<input name="description" th:value="${task.description}" class="form-control mb-2">

<select name="priority" class="form-control mb-2">
<option th:selected="${task.priority=='LOW'}">LOW</option>
<option th:selected="${task.priority=='MEDIUM'}">MEDIUM</option>
<option th:selected="${task.priority=='HIGH'}">HIGH</option>
</select>

<select name="status" class="form-control mb-2">
<option th:selected="${task.status=='PENDING'}">PENDING</option>
<option th:selected="${task.status=='COMPLETED'}">COMPLETED</option>
</select>

<input type="date" name="dueDate" th:value="${task.dueDate}" class="form-control mb-2">

<button class="btn btn-success w-100">Update</button>

</form>

</div>
</div>

</body>
</html>
